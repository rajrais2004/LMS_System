version: '3.9'
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env.example
    ports:
      - '4000:4000'
    depends_on:
      - mongo
    volumes:
      - ./apps/api:/usr/src/app

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://api:4000
    ports:
      - '3000:3000'
    depends_on:
      - api
    volumes:
      - ./apps/web:/usr/src/app

volumes:
  mongo-data:
